<html lang="ro">
<head>
  <meta charset="UTF-8" />

  <title>Contact | Orizonturi Mici</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <img class="logo-image" src="assets/logo.png" alt="Logo Orizonturi Mici" />
        <div>
          <h1>Orizonturi Mici</h1>
          <p>Grădinița Cahul</p>
        </div>
      </div>
      <nav class="main-nav">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="despre-noi.html">Despre Noi</a>
        <a class="nav-link" href="program.html">Program</a>
        <a class="nav-link" href="gallery.html">Galerie</a>
        <a class="nav-link active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <h2>CONTACT &amp; ÎNSCRIERI</h2>
      </div>
    </section>

    <section class="contact-section" id="contact">
      <div class="container contact-grid">
        <div class="contact-copy">
          <h3>Trimite o solicitare de înscriere</h3>
          <form class="contact-form" action="Inscrieri.html" method="get">
            <label>
              <span>Nume Complet Părinte</span>
              <input type="text" name="parent-name" placeholder="Nume complet" />
            </label>
            <label>
              <span>Adresă Email</span>
              <input type="email" name="email" placeholder="exemplu@domeniu.md" />
            </label>
            <label>
              <span>Număr Copil &amp; Vârstă</span>
              <input type="text" name="child-info" placeholder="Nume copil și vârsta" />
            </label>
            <label>
              <span>Mesaj / Mențiuni speciale</span>
              <textarea name="message" rows="5" placeholder="Spune-ne mai multe..."></textarea>
            </label>
            <button type="submit">Trimite datele</button>
          </form>
        </div>
        <div class="contact-image">
          <img src="assets/5.jpg" alt="Imagine contact" />
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="contact">
    <div class="container footer-grid">
      <div>
        <p>Orașul Cahul, Republica Moldova</p>
        <p>Telefon: 067546733</p>
      </div>
      <div class="footer-center">
        <p>© 2026 Orizonturi Mici</p>
      </div>
      <div class="footer-right">
        <p>Proiect de practică: Dornean Maxim (Grupa W 2421)</p>
        <p>Colegiul „Iulia Hasdeu”</p>
      </div>
    </div>
  </footer>
</body>
</html>
